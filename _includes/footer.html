<footer class="site-footer">
  <div class="wrapper footer-inner">
    <ul class="footer-links">
      {%- if site.github_username -%}
      <li><a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a></li>
      {%- endif -%}
      {%- if site.linkedin_username -%}
      <li><a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">LinkedIn</a></li>
      {%- endif -%}
      {%- if site.kaggle_username -%}
      <li><a href="https://kaggle.com/{{ site.kaggle_username }}" target="_blank">Kaggle</a></li>
      {%- endif -%}
      {%- if site.huggingface_username -%}
      <li><a href="https://huggingface.co/{{ site.huggingface_username }}" target="_blank">HuggingFace</a></li>
      {%- endif -%}
    </ul>
  </div>
</footer>
